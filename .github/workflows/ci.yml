name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          run_install: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:check
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
      - name: Load native Bash and Zsh completion
        run: pnpm test:completion
      - name: Verify compiled CLI automation contracts on Linux
        run: pnpm test:automation
      - run: pnpm test:integration
      - run: pnpm test:acceptance
      - name: Exercise packed, global, npm, npx, and Bun consumers
        run: pnpm test:package
        env:
          AWF_TEST_BUNX: "1"
      - run: pnpm validate:recipes
      - run: pnpm validate:content
      - run: pnpm audit:similarity
      - run: pnpm test:fixtures
      - run: pnpm docs:build
      - run: pnpm check:links
      - name: Ensure tracked and untracked generated artifacts are current
        run: pnpm check:clean

  filesystem:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          run_install: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: pnpm install --frozen-lockfile
      - name: Exercise unit contracts on ${{ runner.os }}
        run: pnpm test
      - run: pnpm build
      - name: Load Bash completion on Linux
        if: runner.os == 'Linux'
        run: pnpm test:completion -- --shell bash
      - name: Load Zsh completion on macOS
        if: runner.os == 'macOS'
        run: pnpm test:completion -- --shell zsh
      - name: Load PowerShell completion on Windows
        if: runner.os == 'Windows'
        run: pnpm test:completion -- --shell pwsh
      - name: Install Fish on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes fish
      - name: Load Fish completion on Linux
        if: runner.os == 'Linux'
        run: pnpm test:completion -- --shell fish
      - name: Exercise compiled CLI on ${{ runner.os }}
        run: pnpm test:automation
      - name: Exercise CLI automation from Git Bash on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: pnpm test:automation
      - run: pnpm test:integration
      - name: Verify the macOS PTY driver
        if: runner.os == 'macOS'
        run: expect -v
      - name: Exercise CLI acceptance on ${{ runner.os }}
        run: pnpm test:acceptance
      - name: Exercise packed, globally installed, and Bun package runners on ${{ runner.os }}
        run: pnpm test:package
        env:
          AWF_TEST_BUNX: "1"

  node-22-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          run_install: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify compiled CLI automation contracts on Node.js 22
        run: pnpm test:automation
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm test:acceptance
      - run: pnpm test:package
